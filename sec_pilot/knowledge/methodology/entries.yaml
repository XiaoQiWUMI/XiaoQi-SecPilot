# Penetration Testing Methodology — Complete workflows & checklists
# Category: methodology

- title: "Black-Box Pentest — 6-Phase Methodology"
  content: |
    ## Complete Black-Box Testing Workflow

    ### Phase 1: Information Gathering
    1. Subdomain enumeration (subfinder + amass + crt.sh)
    2. Port scanning (nmap -sC -sV top ports)
    3. Technology fingerprinting (Wappalyzer, WhatWeb, BuiltWith)
    4. JS endpoint extraction (katana + LinkFinder)
    5. Parameter discovery (Arjun + Wayback/CommonCrawl)
    6. Directory brute-forcing (ffuf recursive)
    7. WHOIS / DNS record analysis

    ### Phase 2: Attack Surface Mapping
    1. Categorize by technology (CMS, framework, custom)
    2. Identify authentication endpoints (login, register, SSO, OAuth)
    3. Map API endpoints (REST, GraphQL, WebSocket)
    4. Identify file upload features
    5. Find search/query parameters
    6. Map user roles & privilege levels
    7. Catalog third-party integrations

    ### Phase 3: Vulnerability Analysis
    **Authentication:**
    - Default credentials
    - Weak password policy
    - JWT/OAuth misconfigurations
    - Session management flaws
    - MFA bypass

    **Injection:**
    - SQL injection (all params)
    - XSS (reflected → stored → DOM)
    - SSTI (template engines)
    - XXE (XML inputs)
    - Command injection
    - CRLF injection
    - LDAP injection

    **Access Control:**
    - IDOR (horizontal/vertical)
    - Forced browsing (hidden endpoints)
    - CORS misconfiguration
    - Missing authorization on APIs

    **File Handling:**
    - Unrestricted file upload
    - Path traversal (LFI/RFI)
    - Arbitrary file read/write

    **Business Logic:**
    - Race conditions
    - Mass assignment
    - Parameter tampering
    - Workflow bypass

    ### Phase 4: Exploitation
    1. Prioritize by severity & ease
    2. Develop PoC (keep it reproducible)
    3. Chain vulnerabilities (e.g., XSS → CSRF → privilege escalation)
    4. Document every attack step
    5. Capture screenshots/evidence

    ### Phase 5: Reporting
    1. Title: Concise, descriptive
    2. Severity: CVSS 3.1 scoring
    3. Steps to reproduce: Step-by-step, clear
    4. Impact: What an attacker can achieve
    5. Remediation: Actionable fix

    ### Phase 6: Retesting
    1. Verify fixes are applied
    2. Check for bypasses of the fix
    3. Re-test related functionality
