  keywords: [渗透测试方法, 黑盒测试, 工作流程, 6阶段, 信息收集, 漏洞分析, 报告]
  severity: info

- title: "Education Vulnerability Scoring Standards"
  content: |
    ## Education Vulnerability Report Scoring

    ### Severity Levels
    | Level | CVSS | Description |
    |-------|------|-------------|
    | **Critical** | 9.0-10.0 | Direct access to core data (student info, grades, personal data), system takeover |
    | **High** | 7.0-8.9 | Sensitive data exposure, auth bypass, privilege escalation |
    | **Medium** | 4.0-6.9 | Limited data exposure, CSRF, stored XSS |
    | **Low** | 0.1-3.9 | Information disclosure, clickjacking, reflected XSS (limited) |

    ### Ignore Rules (Usually Not Accepted)
    - Self-XSS (requires victim to paste code)
    - Clickjacking without sensitive actions
    - Missing security headers (HSTS, CSP, X-Frame-Options alone)
    - Rate limiting issues on login (unless severe)
    - Version disclosure without exploitation proof
    - Open redirect without chaining
    - CSRF on logout
    - Username enumeration on login (unless sensitive context)

    ### What Matters Most
    1. **Reproducibility** — step-by-step proof
    2. **Impact** — what can an attacker actually achieve?
    3. **Sensitivity** of affected data
    4. **Scalability** — does it affect many users/systems?
    5. **Chainability** — can it be part of a larger attack?

    ### Log Sources Used to Verify
    - ACCESS logs (IP, timestamp, user-agent)
    - OPERATION logs (action, target, result)
    - Be prepared to provide these on submission
