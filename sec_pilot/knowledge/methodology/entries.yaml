- title: "Report Template (Education Platform)"
  content: |
    ## Vulnerability Report Template

    ### Title Format
    ```
    [Vulnerability Type] in [Module/System] allows [Impact]
    Example: SQL Injection in /api/student/query allows unauthorized data access
    ```

    ### Report Structure
    ```markdown
    ## Vulnerability Description
    Brief description (1-2 sentences)

    ## Affected URL/Endpoint
    https://target.edu.cn/api/v1/student/query

    ## Vulnerability Type
    SQL Injection (Critical)

    ## Reproduction Steps
    1. Visit https://target.edu.cn/api/v1/student/query
    2. Input payload: ' UNION SELECT 1,2,3 --
    3. Observe: Student data returned from other tables
    4. Confirm: Database information exposed

    ## Proof of Concept
    [Screenshot showing attack result]
    [Request/response evidence]
    [Access log evidence if applicable]

    ## Impact
    - Unauthorized access to all student records
    - Potential to modify academic data
    - Affects N users

    ## CVSS 3.1 Score
    AV:N/AC:L/PR:N/UI:N/S:U/C:H/I:H/A:N → 9.1 (Critical)

    ## Remediation
    1. Use parameterized queries
    2. Implement WAF rules
    3. Input validation

    ## Additional Notes
    [Any chaining opportunities, edge cases, etc.]
    ```
  tags: [report, template, education-platform, cvss, submission]
  keywords: [报告模板, 提交模板, 漏洞报告, 教育平台提交, cvss评分]
