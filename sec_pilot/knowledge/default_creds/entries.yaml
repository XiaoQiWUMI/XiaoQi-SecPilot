- title: "Educational Platform Defaults"
  content: |
    ## Educational Systems (Common in .edu.cn)

    ### Online Learning (教务/学习通/智慧树)
    ```
    admin/admin, admin/123456, admin/admin123
    admin/12345678, admin/password
    jwc/jwc123, jwc/admin888
    admin/<school_pinyin>123  (e.g., admin/hnlg123)
    ```

    ### VPN / SSO
    ```
    <student_id>/<student_id>
    <student_id>/123456
    <student_id>/<id_number_last_6>
    <teacher_id>/123456
    ```

    ### Library / E-Resources
    ```
    lib/lib123, library/library, tushuguan/tushuguan
    reader/reader, guest/guest
    ```

    ### Cloud Desktop / Lab
    ```
    admin/admin, admin/123456, admin/admin888
    student/student, student/123456
    ```

    ### Common Pattern Summary
    ```
    Pattern 1: username = password
    Pattern 2: username/123456
    Pattern 3: admin/admin + suffix (admin888, admin123, etc.)
    Pattern 4: <org_abbr>/<org_abbr> + 123 (e.g., whu/whu123)
    Pattern 5: ID-based: student ID + last 6 digits of ID card
    ```
  tags: [default-password, education, university, portal, sso, library, vpn]
  keywords: [教育系统默认口令, 教务系统, 统一认证, 图书馆, vpn默认口令, 校园网]
  severity: medium
